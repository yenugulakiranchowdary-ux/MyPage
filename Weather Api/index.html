<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Short Weather IST</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; background: #1a365d; color: white; display: flex; justify-content: center; padding: 20px; }
        .card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 25px; border-radius: 15px; width: 100%; max-width: 450px; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 8px 32px 0 rgba(0,0,0,0.37); }
        .clock { color: #93c5fd; font-family: monospace; margin-bottom: 20px; text-align: center; font-weight: bold; font-size: 1.1rem; }
        .search { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border-radius: 5px; border: none; outline: none; color: #333; }
        button { padding: 10px 20px; background: #2563eb; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #1d4ed8; }
        .result { text-align: center; animation: fadeIn 0.5s; }
        .temp { font-size: 4rem; font-weight: bold; margin: 10px 0; }
        .hidden { display: none; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="card">

    <div id="ist-clock" class="clock">Loading IST...</div>
    
    <div class="search">
        <input type="text" id="city-input" placeholder="Enter city (e.g. Mumbai)">
        <button id="search-btn" onclick="getWeather()">Search</button>
    </div>

    <div id="loading" class="hidden" style="text-align: center; padding: 20px;">
        <i class="fas fa-spinner fa-spin"></i> Fetching live weather...
    </div>

    <div id="weather-display" class="hidden result">
        <h2 id="city-name">City</h2>
        <div id="icon-div" style="font-size: 3.5rem; margin: 15px 0;"></div>
        <div class="temp"><span id="temp-val">--</span>°C</div>
        <p id="desc" style="text-transform: capitalize; color: #bfdbfe; font-size: 1.2rem;"></p>
        <hr style="margin: 20px 0; opacity: 0.2;">
        <div style="display: flex; justify-content: space-around; font-size: 1rem;">
            <div><i class="fas fa-tint"></i> Humidity: <span id="hum">--</span>%</div>
            <div><i class="fas fa-wind"></i> Wind: <span id="wind">--</span> km/h</div>
        </div>
    </div>
</div>

<script>

    const weatherApiKey = "e1078c7f3e3194f1311d9e85c59e9368"; 

    setInterval(() => {
        const now = new Date();
        const istTime = new Intl.DateTimeFormat('en-IN', {
            timeZone: 'Asia/Kolkata', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true
        }).format(now);
        document.getElementById('ist-clock').innerText = "IST: " + istTime;
    }, 1000);

    async function getWeather() {
        const city = document.getElementById('city-input').value.trim();
        if (!city) return;

        const display = document.getElementById('weather-display');
        const loader = document.getElementById('loading');
        const btn = document.getElementById('search-btn');

        loader.classList.remove('hidden');
        display.classList.add('hidden');
        btn.disabled = true;

        try {
   
            const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${weatherApiKey}`);
            
            if (!response.ok) throw new Error("City not found");

            const data = await response.json();


            document.getElementById('city-name').innerText = `${data.name}, ${data.sys.country}`;
            document.getElementById('temp-val').innerText = Math.round(data.main.temp);
            document.getElementById('desc').innerText = data.weather[0].description;
            document.getElementById('hum').innerText = data.main.humidity;
            document.getElementById('wind').innerText = (data.wind.speed * 3.6).toFixed(1); 
            
     
            const iconCode = data.weather[0].icon;
            document.getElementById('icon-div').innerHTML = `<img src="https://openweathermap.org/img/wn/${iconCode}@2x.png" alt="weather icon">`;

            display.classList.remove('hidden');
        } catch (error) {
            alert("Error: " + error.message);
        } finally {
            loader.classList.add('hidden');
            btn.disabled = false;
        }
    }

    document.getElementById('city-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') getWeather();
    });
</script>
</body>
</html>
