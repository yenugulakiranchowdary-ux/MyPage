<!DOCTYPE html>
<html>
<head>
<title>Oppty Break System - Login</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
*{ box-sizing:border-box; }

body{
    margin:0;
    font-family: 'Poppins', sans-serif;
    height:100vh;
    background: linear-gradient(120deg, #f1f4f9, #e6ebf5);
    display:flex;
    justify-content:center;
    align-items:center;
}

/* soft corporate background shapes */
body::before{
    content:"";
    position:absolute;
    width:520px;
    height:520px;
    background:#dde4f3;
    border-radius:50%;
    top:-180px;
    left:-180px;
}

body::after{
    content:"";
    position:absolute;
    width:450px;
    height:450px;
    background:#e9eef7;
    border-radius:50%;
    bottom:-180px;
    right:-150px;
}

.box{
    position:relative;
    width:420px;
    padding:45px 35px;
    border-radius:14px;
    background:white;
    box-shadow:0 20px 40px rgba(0,0,0,0.12);
    text-align:center;
}

.box img{
    width:90px;
    margin-bottom:10px;
}

h2{
    font-size:26px;
    font-weight:700;
    line-height:1.3;
    margin-bottom:20px;
    color:#232f3e;
}

input{
    width:100%;
    padding:13px 15px;
    margin-top:14px;
    border-radius:6px;
    border:1px solid #ccd6e0;
    outline:none;
    font-size:16px;
}

input:focus{
    border-color:#007185;
    box-shadow:0 0 0 2px rgba(0,113,133,0.15);
}

.toggle{
    display:flex;
    justify-content:center;
    gap:25px;
    margin-top:16px;
    font-weight:600;
    color:#232f3e;
}

button{
    margin-top:25px;
    width:100%;
    padding:14px;
    border:none;
    border-radius:6px;
    font-size:18px;
    font-weight:700;
    cursor:pointer;
    background:#ffd814;
    color:#111;
    box-shadow:0 4px 10px rgba(0,0,0,0.15);
    transition:0.25s;
}

button:hover{
    background:#f7ca00;
}

.error{
    margin-top:12px;
    color:#d93025;
    font-weight:600;
}
</style>
</head>

<body>

<div class="box">
    <img src="WhatsApp Image 2026-01-10 at 1.20.09 PM.jpeg">
    <h2>EMPLOYEES LOGIN<br>PORTAL</h2>

    <input id="username" placeholder="Email / Username">
    <input id="password" type="password" placeholder="Password">

    <div class="toggle">
        <label><input type="radio" name="role" value="admin" checked> Admin</label>
        <label><input type="radio" name="role" value="user"> User</label>
    </div>

    <button onclick="login()">Login</button>
    <p class="error" id="err"></p>
</div>

<script>
function login(){
    const uname=username.value.trim();
    const pass=password.value.trim();
    const role=document.querySelector('input[name="role"]:checked').value;

    if(role==="admin"){
        if(uname==="kiran@oppty.in" && pass==="kiran@1234"){
            localStorage.setItem("role","admin");
            location="admin.html";
        }else err.innerText="Invalid Admin credentials";
        return;
    }

    let users=JSON.parse(localStorage.getItem("users"))||[];
    let user=users.find(u=>u.username===uname && u.password===pass);

    if(user){
        localStorage.setItem("role","user");
        localStorage.setItem("currentUser",uname);
        location="user.html";
    }else err.innerText="Invalid User credentials";
}
</script>

</body>
</html>
