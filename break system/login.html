<!DOCTYPE html>
<html>
<head>
<title>Oppty Break System - Login</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
*{ box-sizing:border-box; }

body{
    margin:0;
    font-family:'Poppins', sans-serif;
    height:100vh;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}


body::before{
    content:"";
    position:absolute;
    width:600px;
    height:600px;
    background:rgba(255,255,255,0.04);
    border-radius:50%;
    top:-200px;
    left:-200px;
}
body::after{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:rgba(255,255,255,0.03);
    border-radius:50%;
    bottom:-200px;
    right:-200px;
}

.wrapper{
    width:460px;
    height:520px;
    position:relative;
    z-index:5;
}

.glass{
    width:100%;
    height:100%;
    position:relative;
    border-radius:14px;
    backdrop-filter: blur(12px);
    background: rgba(255,255,255,0.95);
    box-shadow:0 30px 80px rgba(0,0,0,0.35);
    overflow:hidden;
}

/* cards */
.card{
    position:absolute;
    width:100%;
    height:100%;
    padding:55px 42px;
    text-align:center;
    transition:0.6s cubic-bezier(.19,1,.22,1);
}

.card img{
    width:85px;
    margin-bottom:18px;
}

.card h2{
    font-size:26px;
    font-weight:700;
    color:#111;
    margin-bottom:28px;
}

input{
    width:100%;
    padding:14px 16px;
    margin-top:16px;
    border-radius:8px;
    border:1px solid #cfd6dc;
    font-size:15px;
    outline:none;
    background:#f9fafb;
}

input:focus{
    border-color:#ff9900;
    box-shadow:0 0 0 2px rgba(255,153,0,.2);
    background:#fff;
}

button{
    width:100%;
    padding:15px;
    margin-top:30px;
    border:none;
    border-radius:8px;
    font-size:17px;
    font-weight:700;
    cursor:pointer;
    background: linear-gradient(180deg,#ffb347,#ff9900);
    color:#111;
    transition:.25s;
}

button:hover{
    background: linear-gradient(180deg,#ff9900,#e68a00);
}

.switch{
    margin-top:22px;
    font-weight:600;
    color:#146eb4;
    cursor:pointer;
}


.admin{ left:0; }
.user{ left:100%; }

.wrapper.showUser .admin{ left:-100%; }
.wrapper.showUser .user{ left:0; }

.error{
    margin-top:14px;
    color:#d93025;
    font-weight:600;
}
</style>
</head>

<body>

<div class="wrapper" id="wrap">
    <div class="glass">

    
        <div class="card admin">
            <img src="WhatsApp_Image_2026-01-10_at_1.20.09_PM-removebg-preview.png">
            <h2>ADMIN LOGIN</h2>

            <input id="adminUser" placeholder="Admin Email">
            <input id="adminPass" type="password" placeholder="Password">

            <button onclick="adminLogin()">Login</button>

            <div class="switch" onclick="switchCard('user')">User Login →</div>
            <div class="error" id="aErr"></div>
        </div>


        <div class="card user">
            <img src="WhatsApp_Image_2026-01-10_at_1.20.09_PM-removebg-preview.png">
            <h2>USER LOGIN</h2>

            <input id="userName" placeholder="User Email">
            <input id="userPass" type="password" placeholder="Password">

            <button onclick="userLogin()">Login</button>

            <div class="switch" onclick="switchCard('admin')">← Admin Login</div>
            <div class="error" id="uErr"></div>
        </div>

    </div>
</div>

<script>
function switchCard(type){
    const w = document.getElementById("wrap");
    if(type === "user") w.classList.add("showUser");
    else w.classList.remove("showUser");
}

function adminLogin(){
    const u = adminUser.value.trim();
    const p = adminPass.value.trim();

    if(u === "kiran@oppty.in" && p === "kiran@1234"){
        localStorage.setItem("role","admin");
        location="admin.html";
    } else {
        aErr.innerText = "Invalid Admin credentials";
    }
}

function userLogin(){
    let users = JSON.parse(localStorage.getItem("users")) || [];
    let u = userName.value.trim();
    let p = userPass.value.trim();

    let user = users.find(x => x.username === u && x.password === p);

    if(user){
        localStorage.setItem("role","user");
        localStorage.setItem("currentUser", u);
        location="user.html";
    } else {
        uErr.innerText = "Invalid User credentials";
    }
}
</script>

</body>
</html>
