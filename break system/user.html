<!DOCTYPE html>
<html>
<head>
<title>User Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{ box-sizing:border-box; }

body{
    margin:0;
    font-family:Poppins;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    padding:28px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:28px;
    color:white;
}

.logo{height:55px;}

.actions{display:flex;gap:12px;}

button{
    padding:10px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
}

.logout{background:#dc2626;color:white;}
.backBtn{background:#374151;color:white;}


.layout{display:flex;gap:22px;}

.sidebar{width:260px;}

.main{flex:1;}


.card{
    background:white;
    padding:26px;
    border-radius:14px;
    margin-bottom:22px;
    box-shadow:0 12px 30px rgba(0,0,0,.25);
}

h3{margin-top:0;}


select{
    padding:11px 14px;
    border-radius:7px;
    border:1px solid #d1d5db;
}

.b1{background:#16a34a;color:white;}
.b2{background:#dc2626;color:white;}


.analytics .grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:14px;
}

.mini{
    background:#f3f4f6;
    padding:18px;
    border-radius:10px;
    text-align:center;
}


.popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.6);
    display:none;
    justify-content:center;
    align-items:center;
}

.popup-box{
    background:white;
    padding:30px;
    border-radius:14px;
    width:320px;
    text-align:center;
}
</style>
</head>

<body>

<div class="header">
<img src="WhatsApp_Image_2026-01-10_at_1.20.09_PM-removebg-preview.png" class="logo">
<h2>User Dashboard</h2>
<div class="actions">
<button class="logout" onclick="logoutUser()">Logout</button>
<button class="backBtn" onclick="goBackToAdmin()">← Back</button>
</div>
</div>

<div class="layout">


<div class="sidebar">
  <div class="card">
    <h3>👥 Team Live Status</h3>
    <p id="teamStatus"></p>
  </div>
</div>


<div class="main">

<div class="card">
<h3>Break Management</h3>

<select id="breakType">
<option value="Regular">Regular</option>
<option value="Lunch">Lunch</option>
</select><br><br>

<button class="b1" onclick="startBreak()">Break In</button>
<button class="b2" onclick="endBreak()">Break Out</button>

<p id="breakStatus"></p>
<p><b>Live Session Timer:</b> <span id="liveSession">00:00</span></p>
</div>

<div class="card analytics">
<h3>Daily Activity Summary</h3>

<div class="grid">
<div class="mini"><p>Total Breaks</p><h4 id="totalBreaks">0</h4></div>
<div class="mini"><p>Total Break Duration</p><h4 id="totalMinutes">0 mins</h4></div>
<div class="mini"><p>Lunch Breaks</p><h4 id="lunchCount">0</h4></div>
</div>
</div>

</div>
</div>


<div id="breakPopup" class="popup">
  <div class="popup-box">
    <h3>🕒 Break Started</h3>
    <p>Your break session has started</p>
  </div>
</div>

<script>
if(localStorage.getItem("role")!=="user") location="login.html";

let users = JSON.parse(localStorage.getItem("users")) || [];
let currentUser = localStorage.getItem("currentUser");
let sessionTimer;

function IST(){ return new Date().toLocaleString("en-IN",{timeZone:"Asia/Kolkata"}); }
function getMe(){ return users.find(u=>u.username===currentUser); }

function updateUI(){
users = JSON.parse(localStorage.getItem("users")) || [];
let me = getMe(); if(!me) return;

breakStatus.innerText = me.status==="AWAY" ?
"You are on "+me.breakType+" Break" : "You are Working";

let total=0, lunch=0, minutes=0;
me.logs = me.logs || [];

me.logs.forEach(l=>{
  total++;
  if(l.type==="Lunch") lunch++;
  if(l.start && l.end){
    let s = new Date(l.start).getTime();
    let e = new Date(l.end).getTime();
    if(!isNaN(s) && !isNaN(e) && e > s){
      minutes += Math.floor((e - s)/60000);
    }
  }
});

totalBreaks.innerText = total;
lunchCount.innerText = lunch;
totalMinutes.innerText = minutes + " mins";

updateTeamStatus();
}

function startBreak(){
let me = getMe();
me.status = "AWAY";
me.breakType = breakType.value;
me.breakStart = Date.now();
me.logs.push({type:me.breakType,start:IST()});
save();
startSessionTimer();

breakPopup.style.display="flex";
setTimeout(()=>breakPopup.style.display="none",1200);
}

function endBreak(){
let me = getMe();
let log = me.logs.find(l=>!l.end);
log.end = IST();
me.status = "ONLINE";
me.breakType = null;
me.breakStart = null;
save();
stopSessionTimer();
}

function startSessionTimer(){
clearInterval(sessionTimer);
sessionTimer = setInterval(()=>{
let me = getMe();
if(me && me.breakStart){
let sec = Math.floor((Date.now()-me.breakStart)/1000);
let m = String(Math.floor(sec/60)).padStart(2,"0");
let s = String(sec%60).padStart(2,"0");
liveSession.innerText = `${m}:${s}`;
}
},1000);
}

function stopSessionTimer(){
clearInterval(sessionTimer);
liveSession.innerText = "00:00";
}

function updateTeamStatus(){
let text="";
users.forEach(u=>{
let state = u.status==="AWAY" ? "🟡 On Break" : "🟢 Working";
text += `${u.username} - ${state}<br>`;
});
teamStatus.innerHTML = text;
}

function save(){
localStorage.setItem("users",JSON.stringify(users));
updateUI();
}

setInterval(updateTeamStatus,30000);
updateUI();

function logoutUser(){ localStorage.clear(); location="login.html"; }
function goBackToAdmin(){ localStorage.setItem("role","admin"); location="admin.html"; }
</script>

</body>
</html>
